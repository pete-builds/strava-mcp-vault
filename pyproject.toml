[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = "test_*.py"

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501"]

[tool.coverage.run]
source = ["cache", "clients", "formatters", "auth", "server"]
omit = ["tests/*", "healthcheck.py"]

[tool.coverage.report]
fail_under = 70
show_missing = true
