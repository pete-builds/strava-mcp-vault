services:
  strava-mcp-vault:
    build: .
    container_name: strava-mcp-vault
    ports:
      - "${MCP_BIND_HOST:-0.0.0.0}:${STRAVA_MCP_PORT:-18201}:18201"
    env_file: .env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - strava-data:/app/data
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  strava-data:
